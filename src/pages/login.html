<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DevPulse</title>
    <link rel="stylesheet" href="/css/output.css">
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full">
            <div class="text-center mb-8">
                <a href="/" class="text-3xl font-bold text-blue-600">DevPulse</a>
                <h2 class="mt-6 text-2xl font-bold text-gray-900">Welcome Back</h2>
                <p class="mt-2 text-gray-600">Sign in to your account</p>
            </div>
            
            <div class="card">
                <form id="loginForm">
                    <div class="mb-4">
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                            Email Address
                        </label>
                        <input type="email" id="email" name="email" required 
                               class="input-field" placeholder="john@example.com">
                    </div>
                    
                    <div class="mb-6">
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                            Password
                        </label>
                        <input type="password" id="password" name="password" required 
                               class="input-field" placeholder="••••••••">
                    </div>
                    
                    <button type="submit" class="btn-primary w-full">Login</button>
                </form>
                
                <p class="mt-4 text-center text-sm text-gray-600">
                    Don't have an account? 
                    <a href="/pages/register.html" class="text-blue-600 hover:text-blue-700 font-medium">
                        Sign up
                    </a>
                </p>
            </div>
        </div>
    </div>
    
    <script type="module">
        import { handleLogin, redirectIfLoggedIn } from '/js/auth.js';
        
        // Redirect if already logged in
        redirectIfLoggedIn();
        
        // Handle form submission
        const form = document.getElementById('loginForm');
        form.addEventListener('submit', handleLogin);
    </script>
</body>
</html>
